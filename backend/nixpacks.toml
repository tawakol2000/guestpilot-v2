# Nixpacks config: Node.js + Python for LR classifier training
[phases.setup]
nixPkgs = ["python3", "python3Packages.pip"]

[phases.install]
cmds = [
  "npm install",
  "pip install scikit-learn numpy cohere"
]

[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build"
]

[start]
cmd = "npm run start"
